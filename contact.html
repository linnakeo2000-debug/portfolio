<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Editorial Portfolio | Contact</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "background": "#fcf9f8",
                "primary": "#03192e",
                "secondary": "#9b4149",
                "surface-container": "#f0eded",
                "surface-container-low": "#f6f3f2",
                "on-surface": "#1b1c1c",
                "on-surface-variant": "#43474d",
                "outline": "#74777d",
                "on-primary": "#ffffff"
              },
              fontFamily: {
                "headline": ["Noto Serif"],
                "body": ["Manrope"],
                "label": ["Manrope"]
              }
            }
          }
        }
    </script>
<style>
        .text-editorial-display { letter-spacing: -0.02em; }
        .text-editorial-label { letter-spacing: 0.05em; }
    </style>
</head>
<body class="bg-background text-on-surface font-body">
<nav class="fixed top-0 w-full z-50 bg-[#fcf9f8]/80 backdrop-blur-xl shadow-[0_20px_40px_rgba(27,28,28,0.04)]">
<div class="flex justify-between items-center max-w-7xl mx-auto px-8 py-6">
<span class="text-2xl font-headline tracking-tighter text-primary">The Editorial Portfolio</span>
<div class="hidden md:flex items-center space-x-12">
<a class="text-on-surface hover:text-secondary transition-colors duration-300 font-label text-editorial-label" href="index.html">Home</a>
<a class="text-on-surface hover:text-secondary transition-colors duration-300 font-label text-editorial-label" href="experience.html">Experience</a>
<a class="text-on-surface hover:text-secondary transition-colors duration-300 font-label text-editorial-label" href="index.html#projects">Projects</a>
<a class="text-secondary font-semibold border-b-2 border-secondary pb-1 font-label text-editorial-label" href="contact.html">Contact</a>
</div>
<a class="bg-primary text-on-primary px-6 py-2 rounded font-label uppercase text-editorial-label text-xs tracking-widest inline-flex items-center" href="contact.html">Let's Talk</a>
</div>
</nav>
<main class="pt-32">
<section class="max-w-6xl mx-auto px-8 py-20 grid grid-cols-1 md:grid-cols-2 gap-16 items-start">
<div class="space-y-6">
<span class="font-label text-xs uppercase tracking-widest text-secondary block">Get In Touch</span>
<h1 class="text-5xl md:text-7xl font-headline text-primary text-editorial-display">Contact</h1>
<p class="text-lg text-on-surface-variant leading-relaxed">Open for freelance collaborations, design leadership roles, and editorial product consulting.</p>
<div class="space-y-3 text-on-surface-variant">
<p>Email: hello@editorialportfolio.com</p>
<p>Phone: +44 20 5555 0192</p>
<p>Location: London, United Kingdom</p>
</div>
</div>
<form class="bg-surface-container-low p-8 space-y-6">
<div>
<label class="block text-sm uppercase tracking-widest text-on-surface-variant mb-2" for="name">Name</label>
<input class="w-full border border-outline/30 bg-white px-4 py-3" id="name" placeholder="Your name" type="text"/>
</div>
<div>
<label class="block text-sm uppercase tracking-widest text-on-surface-variant mb-2" for="email">Email</label>
<input class="w-full border border-outline/30 bg-white px-4 py-3" id="email" placeholder="Your email" type="email"/>
</div>
<div>
<label class="block text-sm uppercase tracking-widest text-on-surface-variant mb-2" for="message">Message</label>
<textarea class="w-full border border-outline/30 bg-white px-4 py-3 min-h-40" id="message" placeholder="Tell me about your project"></textarea>
</div>
<button class="bg-primary text-on-primary px-8 py-3 uppercase tracking-widest text-sm" type="submit">Send Message</button>
</form>
</section>
</main>
</body>
</html>
